services:

  app:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: notes_app

    working_dir: /var/www

    volumes:
      - ./:/var/www

    depends_on:
      - mysql
      - redis

  nginx:

    image: nginx:latest

    container_name: notes_nginx

    ports:
      - "8000:80"

    volumes:
      - ./:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf

    depends_on:
      - app

  mysql:

    image: mysql:8.0

    container_name: notes_mysql

    environment:
      MYSQL_DATABASE: notes_app
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: laravel
      MYSQL_PASSWORD: root

    ports:
      - "3306:3306"

  redis:

    image: redis:latest

    container_name: notes_redis

    ports:
      - "6379:6379"